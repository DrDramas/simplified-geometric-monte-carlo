# SGMC configuration file
# Format: one entry per line of the form
#   key = value [value ...]
# Lines beginning with '#' and blank lines are ignored.
#
# Lists use whitespace-separated values; list-valued keys accept either the
# singular or plural spelling.
#
# Scan dimensions (full grid per proton energy):
#     beamSpotHists x thresholds x stoppingFiles x nDeValues
#
# The De scan is driven by the electron-cloud histograms written by the
# upstream GetParticleDistributions job: one family of nDriftTimes clouds per De
# value, named "{electronCloudPrefix}{k}_t{j}us" for k in [0, nDeValues),
# j in [0, nDriftTimes).  There is no separate diffusivity parameter here --
# diffusion is entirely encoded in the choice of cloud family.

# ---- Input ROOT file ------------------------------------------------------
histFile            = ParticleDistributions.root

# ---- One or more stopping-power files [MeV/mm] ---------------------------
stoppingFiles       = data/protonStoppingPower808TorrP10gas.txt data/stoppingPower96percent.txt data/stoppingPower104percent.txt

# ---- Histogram names inside histFile --------------------------------------
driftTimesHist      = DriftTimes
beamSpotHists       = BeamSpot_0 BeamSpot_1 BeamSpot_2

# Electron-cloud histograms are named "{prefix}{k}_t{j}us"
# for k in [0, nDeValues), j in [0, nDriftTimes).
electronCloudPrefix = EC_De
nDeValues           = 3
nDriftTimes         = 9

# ---- Simulation parameters ------------------------------------------------
nProtons            = 100
stepSize            = 0.01
thresholds          = 192 385 769

# ---- Proton lab energies [MeV] --------------------------------------------
labEnergies         = 0.250 0.933

# ---- Threading ------------------------------------------------------------
# Energies are processed in parallel -- each worker thread clones the ROOT
# histograms and runs the full scan grid (beamSpot x stoppingFile x De) for
# one energy at a time.  Set to 0 to auto-detect the CPU count.
nThreads            = 0

# ---- Output ---------------------------------------------------------------
summaryFile         = efficiencySummary.txt
