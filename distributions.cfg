# GetParticleDistributions.cfg
#
# Format is "key = value", one per line. Blank lines and anything after '#'
# are ignored. List-valued keys use comma-separated values.
#
# Five keys are now sweeps:
#   - numHalfLives, x_0, y_0, R  must all have the same length N. Index k
#     across all four defines one beam-spot preset -> histogram BeamSpot_k.
#   - De can have any length M. For each De[k], 9 electron-cloud histograms
#     are produced (drift times 0..8 us; j=0 is mapped to 0.1 us) named
#     EC_De{k}_t{j}us.

#------------------------------------------------------------
# Run-size parameters
#------------------------------------------------------------
nElectrons       = 1e6
nProtons         = 1e8
halfLife         = 0.190      # 31Cl half-life [s]
aperatureRadius  = 25.4       # entrance aperture radius [mm]

#------------------------------------------------------------
# Input / output (all optional; defaults shown)
#------------------------------------------------------------
inputFile       = data/BetaDecayData31Cl.root
inputHistName   = roughBeamDistribution
outputFile      = results/ParticleDistributions.root

#------------------------------------------------------------
# Chemistry (used by CalculateDiffusivity)
#------------------------------------------------------------
TKelvin              = 293       # standard room temperature [K]
PTorr                = 808       # fill-gas pressure [Torr]
fillGasAtomicRadius  = 188       # argon atomic radius [pm]
beamIonAtomicRadius  = 175       # chlorine atomic radius [pm]
M_fillGas            = 39.948    # molar mass of argon [g/mol]
M_beamIon            = 30.992448 # mass of 31Cl [g/mol]

#------------------------------------------------------------
# Beam-spot sweep: 3 parallel presets (recommended, upper, lower).
# All four lists must have the same length.
#------------------------------------------------------------
# idx:              0        1       2
# preset:       recommended  upper   lower
numHalfLives =      1,       0,      2
x_0          =      2.9,    -3.1,    8.9
y_0          =    -11.6,    -5.6,  -17.6
R            =     40.4,    28.4,   52.4

#------------------------------------------------------------
# Electron-cloud sweep: 3 values of De (recommended, upper, lower).
# Produces 3 * 9 = 27 electron-cloud histograms.
#------------------------------------------------------------
De           =   9116,    8843,   9389
