# RecoverBeamSpot.cfg
#
# Configuration for the beam-spot fit.  Format is "key = value" per line;
# blank lines and anything after '#' are ignored.  See the comment block
# near the top of RecoverBeamSpot.cpp for a full key reference.

# ------------------------------------------------------------------
# Pad geometry [mm]
# ------------------------------------------------------------------
rCentral       = 14.2    # inner radius of the quadrant pads
rOuterPad      = 27.6    # outer radius of the quadrant pads
rGuardInner    = 40.0    # inner radius of the guard ring (display only)
rGuardOuter    = 50.0    # outer radius of the guard ring (display only)

# ------------------------------------------------------------------
# Numerical integration grid
# ------------------------------------------------------------------
epsR           = 1.0     # radial step
epsThetaDeg    = 1.0     # azimuthal step

# ------------------------------------------------------------------
# Measured pad counts: {central, Q0, Q1, Q2, Q3}
# Uncomment exactly one preset below, or point `intensityFile` at a
# 5-number text file.
# ------------------------------------------------------------------
# padsExperimental = 66729 53481 83967 42570 28117
# padsExperimental =  7060  3948  7308  3992  2662
# padsExperimental =  6060  2948  6308  2992  1662   # 25Si
# padsExperimental = 54383 36000 81874 131860 50681  # 11Be
padsExperimental = 40143 12635 12253 22869 29931    # 31Cl full
# padsExperimental =   921   160   276   982   835   # 32Ar
# padsExperimental =   906   733  1290  1841  1056   # 11Be (alt)

# Or read the counts from an external file (wins over padsExperimental):
# intensityFile = padCounts.txt

# ------------------------------------------------------------------
# Minuit starting point and bounds
# ------------------------------------------------------------------
xStart = 0.0
yStart = 0.0
RStart = 20.0

xStep  = 20.0
yStep  = 20.0
RStep  = 20.0

xLow   = -100.0
xHigh  =  100.0
yLow   = -100.0
yHigh  =  100.0
RLow   =   10.0
RHigh  =  100.0

# ------------------------------------------------------------------
# Output options
# ------------------------------------------------------------------
drawBeam = 0    # 1 to pop a TCanvas with the fit; 0 for headless runs
verbose  = 0    # 1 to print every Minuit function evaluation
